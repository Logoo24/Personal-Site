# Decap CMS configuration
# Docs: https://decapcms.org/docs/configuration-options/
#
# IMPORTANT: After deploying, edit the `repo:` line below to your GitHub repo
# in the form `username/repo-name`. The OAuth proxy lives at /api/auth and
# /api/callback as Vercel serverless functions. See SETUP.md Part 5 for the
# one-time GitHub OAuth app + env var setup.

backend:
  name: github
  repo: Logoo24/Personal-Site   # <-- change to your-github-username/your-repo-name
  branch: main
  base_url: https://www.loganbrandall.com   # <-- your live domain (or your-project.vercel.app)
  auth_endpoint: api/auth

# Where uploaded images go inside the repo
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Show a preview of the post while editing
show_preview_links: true

# What you can edit through the admin
collections:
  - name: "site_images"
    label: "Site images"
    description: "Photos shown around the site. Upload here and the site updates automatically (no rebuild needed)."
    files:
      - file: "data/images.json"
        label: "Photos"
        name: "photos"
        format: "json"
        fields:
          - { label: "Homepage hero cutout", name: "hero_cutout", widget: "image", required: false, hint: "Full-body cutout, ideally a PNG with a transparent background. Sits to the right of the homepage hero text." }
          - { label: "About page hero photo", name: "about_hero", widget: "image", required: false, hint: "Portrait or environmental shot for the top of the About page." }
          - { label: "Resume page hero photo", name: "resume_hero", widget: "image", required: false, hint: "Photo for the top of the Resume page. A clean headshot works well." }

  - name: "homepage_hero"
    label: "Homepage hero (rotating)"
    description: "Three rotating headlines shown on the homepage. A different one shows each visit."
    files:
      - file: "data/hero-variants.json"
        label: "Hero variants"
        name: "hero"
        format: "json"
        fields:
          - label: "Variants"
            name: "variants"
            widget: "list"
            summary: "{{fields.title_main}} {{fields.title_accent}}"
            fields:
              - { label: "Eyebrow (small label above title)", name: "eyebrow", widget: "string" }
              - { label: "Title (main part)", name: "title_main", widget: "string" }
              - { label: "Title (accent / colored part)", name: "title_accent", widget: "string" }
              - { label: "Lede paragraph", name: "lede", widget: "text" }

  - name: "site_stats"
    label: "Homepage stats"
    description: "The four numbers shown in the stats bar on the homepage. 'Blog posts' and 'Classes documented' are auto-counted from your posts on every deploy - editing those here will be overwritten on the next build."
    files:
      - file: "data/stats.json"
        label: "Stats"
        name: "stats"
        format: "json"
        fields:
          - { label: "Projects shipped", name: "projects_shipped", widget: "number", value_type: "int", min: 0, hint: "Manual count. Bump this when you ship a new project." }
          - { label: "Online since (year)", name: "online_since", widget: "number", value_type: "int", min: 2000, max: 2100, hint: "The year this site went live." }
          - { label: "Blog posts (auto)", name: "blog_posts", widget: "number", value_type: "int", min: 0, required: false, hint: "Auto-counted from non-draft posts in _posts/ on every build. No reason to edit." }
          - { label: "Classes documented (auto)", name: "classes_documented", widget: "number", value_type: "int", min: 0, required: false, hint: "Auto-counted from blog posts with category 'Class notes' on every build. No reason to edit." }

  - name: "homepage_projects"
    label: "Homepage featured projects"
    description: "The three project cards in the 'Projects I'm building' section."
    files:
      - file: "data/featured-projects.json"
        label: "Featured projects"
        name: "projects"
        format: "json"
        fields:
          - { label: "Section eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Section title", name: "title", widget: "string" }
          - { label: "Section description", name: "description", widget: "text" }
          - label: "Projects (shown in this order)"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Tag (e.g. 'Web · 2026')", name: "tag", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Tech / type", name: "tech", widget: "string" }
              - { label: "Status (e.g. 'Live', 'Done', 'In progress')", name: "status", widget: "string" }

  - name: "about_page"
    label: "About page"
    description: "All the prose on the About page."
    files:
      - file: "data/about.json"
        label: "About content"
        name: "about"
        format: "json"
        fields:
          - { label: "Hero eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Hero title (main part)", name: "title_main", widget: "string" }
          - { label: "Hero title (accent / colored part)", name: "title_accent", widget: "string" }
          - { label: "Lead paragraph", name: "lead", widget: "text" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            summary: "{{fields.heading}}"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Quote"
            name: "quote"
            widget: "object"
            fields:
              - { label: "Quote text", name: "text", widget: "text" }
              - { label: "Author", name: "author", widget: "string" }
          - { label: "Practical details heading", name: "practical_heading", widget: "string" }
          - label: "Practical details (one per line)"
            name: "practical"
            widget: "list"
            field: { label: "Detail (Markdown links work)", name: "item", widget: "string" }

  - name: "resume_page"
    label: "Resume"
    description: "All the items on the Resume page."
    files:
      - file: "data/resume.json"
        label: "Resume content"
        name: "resume"
        format: "json"
        fields:
          - { label: "Hero eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Hero title (main part)", name: "title_main", widget: "string" }
          - { label: "Hero title (accent / colored part)", name: "title_accent", widget: "string" }
          - label: "Education"
            name: "education"
            widget: "list"
            summary: "{{fields.title}} - {{fields.where}}"
            fields:
              - { label: "When (e.g. '2024 - Present')", name: "when", widget: "string" }
              - { label: "Title (degree, etc.)", name: "title", widget: "string" }
              - { label: "Where (school · location/major)", name: "where", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
          - label: "Experience"
            name: "experience"
            widget: "list"
            summary: "{{fields.title}} - {{fields.where}}"
            fields:
              - { label: "When", name: "when", widget: "string" }
              - { label: "Job title", name: "title", widget: "string" }
              - { label: "Where (company · location)", name: "where", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
          - label: "Selected projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "When", name: "when", widget: "string" }
              - { label: "Project title", name: "title", widget: "string" }
              - { label: "Context (class / personal / etc.)", name: "where", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Skills (grouped by category)"
            name: "skills"
            widget: "list"
            summary: "{{fields.category}}"
            fields:
              - { label: "Category name", name: "category", widget: "string" }
              - { label: "Skills (comma-separated)", name: "items", widget: "string", hint: "Separate skills with commas, e.g. 'HTML, CSS, JavaScript'" }
          - label: "Awards & honors"
            name: "awards"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "When", name: "when", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Where (awarding body)", name: "where", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Footer note (e.g. 'References on request...')", name: "footer_note", widget: "text" }

  - name: "all_projects"
    label: "Projects page"
    description: "All the projects shown on the /projects page. Reorder, add, edit, or delete as you ship things."
    files:
      - file: "data/projects.json"
        label: "Projects"
        name: "projects"
        format: "json"
        fields:
          - { label: "Hero eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Hero title (main part)", name: "title_main", widget: "string" }
          - { label: "Hero title (accent / colored part)", name: "title_accent", widget: "string" }
          - { label: "Lede paragraph", name: "lede", widget: "text" }
          - label: "Projects (shown in this order)"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Thumbnail initials (1-2 chars, shows in the card thumbnail)", name: "glyph", widget: "string", hint: "Short text shown in the thumbnail block, e.g. 'LB', 'RP', '??'." }
              - { label: "Tag (e.g. 'Web · 2026')", name: "tag", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Tech / type", name: "tech", widget: "string" }
              - { label: "Status (e.g. 'Live', 'Done', 'In progress')", name: "status", widget: "string" }

  - name: "posts"
    label: "Blog posts"
    label_singular: "Post"
    folder: "_posts"             # source markdown lives here
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} - {{date | date('MMM D, YYYY')}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - label: "Category"
        name: "category"
        widget: "select"
        default: "personal"
        options:
          - { label: "Personal Blog", value: "personal" }
          - { label: "Academic Blog", value: "academic" }
      - { label: "Short summary", name: "summary", widget: "string", hint: "1-2 sentences shown on the blog list page." }
      - { label: "Reading time (minutes)", name: "readMinutes", widget: "number", default: 4, value_type: "int", min: 1, max: 90 }
      - { label: "Hidden draft? (won't appear on site)", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
